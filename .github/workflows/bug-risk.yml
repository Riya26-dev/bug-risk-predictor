name: Bug Risk CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install pandas scikit-learn joblib numpy

      - name: Train model
        run: |
          mkdir -p models
          python src/train_model.py

      - name: Run tests
        run: python tests/test_predictor.py